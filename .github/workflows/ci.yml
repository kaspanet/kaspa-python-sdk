name: CI

on: [push, pull_request]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter ${{ env.PYTHON_VERSION }}
          sccache: 'true'
          # Build + inject the kaspa.silverscript module for the test interpreter
          # so the bundled wheel can `import kaspa.silverscript` (exercised by the
          # unit tests). It isn't abi3, so it must match the wheel's version; pick
          # the matching CPython from the manylinux container's /opt/python.
          before-script-linux: |
            PYVER="${{ env.PYTHON_VERSION }}"
            PYTAG="cp${PYVER//./}"
            export SILVERSCRIPT_PYTHON="/opt/python/${PYTAG}-${PYTAG}/bin/python"
            bash ci/build-and-inject-silverscript.sh release

      - name: Install wheel and test dependencies
        run: |
          pip install dist/*.whl
          pip install .[dev]

      - name: Run unit tests
        run: pytest tests/unit -v

  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          sccache: 'true'

      - name: Install wheel and documentation dependencies
        run: |
          pip install dist/*.whl
          pip install .[docs]

      - name: Build documentation
        run: mkdocs build --strict

