name: Release
on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build-python-sdk:
    name: Building Python SDK (${{ matrix.platform.runner }} ${{ matrix.platform.target }} py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
            manylinux: '2_28'
          - runner: ubuntu-24.04-arm
            target: aarch64
            manylinux: '2_28'
          - runner: macos-latest
            target: x86_64-apple-darwin
          - runner: macos-latest
            target: aarch64
          - runner: windows-latest
            target: x86_64
          # - runner: windows-latest
          #   target: aarch64
        # silverscript isn't abi3, so it's built per CPython version; each job
        # produces one wheel for one interpreter, bundling the matching .so.
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']

    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      # Build + inject the kaspa.silverscript module for this interpreter before
      # maturin builds the core wheel. silverscript isn't abi3, so it's per
      # version; setup-python's python3 is matrix.python here.
      # Linux is handled inside the manylinux container via before-script-linux.
      - name: Build & inject kaspa.silverscript (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          export SILVERSCRIPT_PY_VERSION="${{ matrix.python }}"
          if [ "${{ matrix.platform.target }}" = "x86_64-apple-darwin" ]; then
            rustup target add x86_64-apple-darwin
            export SILVERSCRIPT_TARGET=x86_64-apple-darwin
          fi
          bash ci/build-and-inject-silverscript.sh release

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --strip --out dist --interpreter ${{ matrix.python }}
          # sccache disabled: the maturin-action manylinux container doesn't reliably have
          # the sccache binary on PATH, which fails the build with "could not execute
          # process sccache ... No such file or directory". Release builds don't need it.
          sccache: 'false'
          manylinux: ${{ matrix.platform.manylinux || '' }}
          before-script-linux: |
            # Link the container's system OpenSSL. We target manylinux_2_28 (AlmaLinux 8,
            # OpenSSL 1.1.1) because openssl-sys dropped support for the EOL OpenSSL 1.0.2
            # that the older manylinux2014 image ships. Install the dev headers + pkg-config
            # so openssl-sys can find and link it (openssl-sys is pulled in transitively via
            # native-tls / tungstenite for the wRPC wss:// client).
            if command -v yum >/dev/null; then
              yum install -y openssl-devel pkgconfig
            fi
            if command -v apt-get >/dev/null; then
              apt-get update -y && apt-get install -y pkg-config libssl-dev
            fi
            # Build + inject the kaspa.silverscript module for this interpreter
            # (the script picks the matching CPython from the manylinux
            # container's /opt/python).
            export SILVERSCRIPT_PY_VERSION="${{ matrix.python }}"
            bash ci/build-and-inject-silverscript.sh release
      
      # Install the freshly-built wheel and import both modules, proving the
      # per-version silverscript .so was injected and loads at runtime (the
      # matrix otherwise only builds, never imports). Offline install (deps are
      # empty) also confirms the wheel is self-contained. Skipped for the
      # cross-compiled macOS x86_64 wheel — it can't run on the arm64 runner.
      - name: Smoke-test wheel import
        if: matrix.platform.target != 'x86_64-apple-darwin'
        shell: bash
        run: |
          python -m pip install --force-reinstall --no-index --find-links dist kaspa
          python -I -c "import kaspa, kaspa.silverscript as ss; assert hasattr(ss, 'compile'); print('import OK:', kaspa.__file__)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.platform.target }}-py${{ matrix.python }}
          path: dist/

  upload-to-release:
    name: Upload Wheels to GitHub Release
    needs: build-python-sdk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Flatten wheel files
        run: |
          mkdir -p wheels
          find artifacts -name "*.whl" -exec mv {} wheels/ \;
          ls -la wheels/
      
      - name: Upload wheels to release
        uses: softprops/action-gh-release@v2
        with:
          files: wheels/*.whl

